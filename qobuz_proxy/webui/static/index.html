<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qobuz-proxy</title>
    <link rel="stylesheet" href="/static/style.css?v={{version}}">
</head>
<body>
    <div class="container">
        <h1>qobuz-proxy</h1>

        <!-- Auth State: Not authenticated -->
        <div id="auth-disconnected" class="card card-error">
            <div class="card-header">
                <span class="status-dot status-error"></span>
                <span>Not connected</span>
            </div>
            <div id="login-error" class="error-message" style="display: none;"></div>
            <button id="oauth-btn" onclick="startLogin()">Sign in with Qobuz</button>
            <details style="margin-top: 12px;">
                <summary style="cursor: pointer; color: var(--muted);">Paste token from web player</summary>
                <p style="margin: 8px 0 4px; font-size: 0.85em; color: var(--muted);">
                    Open <a href="https://play.qobuz.com" target="_blank">play.qobuz.com</a>, log in, then open DevTools → Application → Local Storage → https://play.qobuz.com and copy the values for <code>user_auth_token</code> and <code>user_id</code>.
                </p>
                <form id="token-form" onsubmit="submitToken(event)" style="margin-top: 8px;">
                    <div class="form-group">
                        <label for="token-userid">User ID</label>
                        <input type="text" id="token-userid" name="user_id" placeholder="12345678" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="token-value">User Auth Token</label>
                        <input type="text" id="token-value" name="user_auth_token" placeholder="paste token here" autocomplete="off">
                    </div>
                    <button type="submit" id="token-btn">Connect</button>
                </form>
            </details>
        </div>

        <!-- Auth State: Authenticated -->
        <div id="auth-connected" class="card card-success" style="display: none;">
            <div class="card-header">
                <span class="status-dot status-success"></span>
                <span>Connected</span>
            </div>
            <div class="auth-user">
                <img id="auth-avatar" class="auth-avatar" src="" alt="" style="display: none;">
                <div class="auth-user-info">
                    <strong id="auth-name"></strong>
                    <span id="auth-email" class="auth-email"></span>
                </div>
                <button class="button-danger" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Speakers Section -->
        <div class="card" id="speakers-section">
            <div class="speakers-header">
                <h2>Speakers</h2>
                <button id="add-speaker-btn" onclick="showAddSpeaker()" style="display: none;">+ Add Speaker</button>
            </div>
            <div id="speakers-list">
                <p class="muted">Waiting for authentication...</p>
            </div>
            <div id="add-speaker-panel" style="display: none;"></div>
            <div id="speaker-error" class="error-message" style="display: none;"></div>
        </div>

        <!-- System Section -->
        <div class="card">
            <h2>System</h2>
            <div class="system-info">
                <div class="info-row">
                    <span class="info-label">Version</span>
                    <span id="system-version">--</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Uptime</span>
                    <span id="system-uptime">--</span>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js?v={{version}}"></script>
</body>
</html>
